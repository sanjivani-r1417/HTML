<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body{
            margin:0;
            background:#f0f0f0;
            font-family:Arial,sans-serif;
        }

        .container{
            width:900px;
            height:500px;
            margin:50px auto;
            background:white;
            display:flex;
            box-shadow:0 0 10px gray;
        }

        .left{
            width:35%;
            background:#2874f0;
            color:white;
            padding:40px;
        }

        .left h1{
            margin:0;
        }

        .left p{
            margin-top:20px;
            font-size:22px;
            line-height:35px;
        }

        .right{
            width:65%;
            padding:40px;
        }

        input{
            width:100%;
            border:none;
            border-bottom:2px solid #2874f0;
            padding:10px;
            font-size:18px;
            outline:none;
        }

        .text{
            margin-top:40px;
            color:gray;
        }

        button{
            width:100%;
            background:#fb641b;
            color:white;
            border:none;
            padding:15px;
            font-size:20px;
            margin-top:30px;
            cursor:pointer;
        }

        .signup{
            text-align:center;
            margin-top:180px;
            color:#2874f0;
            font-size:18px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Login</h1>
        <p>
            Get access to your Orders,<br>
            Wishlist and Recommendations
        </p>
    </div>

    <div class="right">

        <input type="text" placeholder="Enter Email/Mobile Number">

        <p class="text">
            By continuing, you agree to Terms of Use and Privacy Policy.
        </p>

        <button>Request OTP</button>

        <div class="signup">
            New User? Create an Account
        </div>

    </div>

</div>

</body>
</html>
