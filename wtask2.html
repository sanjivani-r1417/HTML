<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Flower Spiral</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #bbf2c3; /* Minty green screen color */
            overflow: hidden;
        }

        /* The initial canvas container sets the 45-degree diamond starting point */
        .canvas {
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(45deg);
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 91%;
            height: 91%;
            border: 2px solid #143d1a; 
            border-radius: 12px;       
            box-sizing: border-box;
           animation: spin 100s linear infinite;
        }

       @keyframes spin{
        from{
            transform:rotate(0deg);
        }
        to{
            transform:rotate(360deg);
        }
}
    </style>
</head>
<body>

    <div class="canvas">
        <div class="square"><div class="square"><div class="square"><div class="square"><div class="square">
        <div class="square"><div class="square"><div class="square"><div class="square"><div class="square">
        <div class="square"><div class="square"><div class="square"><div class="square"><div class="square">
        <div class="square"><div class="square"><div class="square"><div class="square"><div class="square">
        <div class="square"><div class="square"><div class="square"><div class="square"><div class="square">
        <div class="square"><div class="square"><div class="square"><div class="square"><div class="square">
            </div></div></div></div></div>
        </div></div></div></div></div>
        </div></div></div></div></div>
        </div></div></div></div></div>
        </div></div></div></div></div>
        </div></div></div></div></div>
    </div>

</body>
</html>
