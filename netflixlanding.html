<!DOCTYPE html>
<html>
<head>
    <title>Netflix Landing Page</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background-image:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");
            background-size:cover;
            background-position:center;
            color:white;
        }

        .header{
            display:flex;
            justify-content:space-between;
            padding:20px 50px;
        }

        .logo{
            color:red;
            font-size:40px;
            font-weight:bold;
        }

        .btn{
            background:red;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
        }

        .content{
            text-align:center;
            margin-top:150px;
        }

        .content h1{
            font-size:60px;
        }

        .content h3{
            font-size:25px;
        }

        .content p{
            font-size:18px;
        }

        input{
            width:300px;
            height:40px;
            padding-left:10px;
        }

        .start{
            height:45px;
            background:red;
            color:white;
            border:none;
            padding:0 20px;
        }
    </style>
</head>

<body>
    

    <div class="header">
        <div class="logo">NETFLIX</div>
        <button class="btn">Sign In</button>
    </div>

    <div class="content">
        <h1>Unlimited Movies, TV Shows and More</h1>
        <h3>Watch anywhere. Cancel anytime.</h3>
        <p>Ready to watch? Enter your email to create or restart your membership.</p>

        <input type="email" placeholder="Email Address">
        <button class="start">Get Started ></button>
    </div>

</body>
</html>
