<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>
    <style>
        body{
            margin:0;
            background:#aee3f7;
            font-family:Arial, sans-serif;
        }

        .card{
            width:800px;
            margin:50px auto;
            background:#d8edf5;
            border-radius:20px;
            padding:40px;
            position:relative;
            overflow:hidden;
        }

        .circle{
            width:250px;
            height:250px;
            background:#6d8ff0;
            border-radius:50%;
            position:absolute;
            top:-100px;
            right:-100px;
        }

        .profile{
            display:flex;
            align-items:center;
        }

        .profile img{
            width:130px;
            height:150px;
            border-radius:50%;
            margin-right:50px;
        }

        h1{
            margin:0;
        }

        h3{
            margin:5px 0;
        }

        p{
            color:#444;
            line-height:1.6;
        }

        .stats{
            display:flex;
            gap:80px;
            margin-top:20px;
        }

        .stats div{
            text-align:center;
        }

        .stats h2{
            margin:0;
        }

        .buttons{
            margin-top:30px;
        }

        .btn1,.btn2{
            padding:15px 40px;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
        }

        .btn1{
            background:black;
            color:white;
            border:none;
        }

        .btn2{
            background:white;
            border:2px solid black;
            margin-left:15px;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="circle"></div>

    <div class="profile">
        <img src="sanju.jpeg" alt="Profile">
        
        <div>
            <h1>Sanjivani Pandhare</h1>
            <h3>@bradsteve</h3>

            <p>
                I'm a Front End Developer, follow me to be the
                first who see my new work.
            </p>

            <div class="stats">
                <div>
                    <h2>25K</h2>
                    <b>Views</b>
                </div>

                <div>
                    <h2>82</h2>
                    <b>Projects</b>
                </div>

                <div>
                    <h2>1.5M</h2>
                    <b>Followers</b>
                </div>
            </div>

            <div class="buttons">
                <button class="btn1">Follow</button>
                <button class="btn2">View Profile</button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
