<!DOCTYPE html>
<html>
<head>
    <title>Instagram Logo</title>

    <style>
        .logo{
            width:220px;
            height:220px;
            margin:100px auto;
            background:linear-gradient(
                45deg,
                #feda75,
                #fa7e1e,
                #d62976,
                #962fbf,
                #4f5bd5
            );
            border-radius:50px;
            position:relative;
        }

        .square{
            width:130px;
            height:130px;
            border:10px solid white;
            border-radius:35px;
            position:absolute;
            top:35px;
            left:35px;
        }

        .circle{
            width:60px;
            height:60px;
            border:10px solid white;
            border-radius:50%;
            position:absolute;
            top:70px;
            left:70px;
        }

        .dot{
            width:18px;
            height:18px;
            background:white;
            border-radius:50%;
            position:absolute;
            top:58px;
            right:58px;
        }
    </style>
</head>

<body>

    <div class="logo">
        <div class="square"></div>
        <div class="circle"></div>
        <div class="dot"></div>
    </div>

</body>
</html>
